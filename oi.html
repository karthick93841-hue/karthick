    <script>
let liked = false;
let count = 0;

function toggleLike() {
    let btn = document.getElementById("heart");
    let likeText = document.getElementById("likecount");

    if (liked) {
        btn.classList.remove("liked");
        count--;
        liked = false;
    } else {
        btn.classList.add("liked");
        count++;
        liked = true;
    }

    likeText.innerText = count;
}
</script>
